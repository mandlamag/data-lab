name: 'transform'
version: '1.0.0'

profile: 'transform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  transform:
    stage:
      +database: stage
      +materialized: table
      deezer_social_networks:
        +schema: dsn
      million_song_dataset_spotify_lastfm:
        +schema: msdsl
      the_atlas_of_economic_complexity:
        +schema: taoec
      depression_detection:
        +schema: dd
      elliptic_bitcoin:
        +schema: ebtc
    silver:
      +database: silver
      +materialized: table
      elliptic_bitcoin:
        +schema: ebtc
    marts:
      +materialized: table
      graphs:
        +database: graphs
        music_taste:
          +schema: music_taste
        econ_comp:
          +schema: econ_comp
        btc_txgraph:
          +schema: btc_txgraph
      analytics:
        +database: analytics
        the_atlas_of_economic_complexity:
          +schema: taoec
        elliptic_bitcoin:
          +schema: ebtc
